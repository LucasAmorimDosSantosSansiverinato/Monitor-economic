version: '3.9'

services:
  api:
    build: .
    container_name: monitor_economic_api
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - db
    command: >
      sh -c "sleep 15 && dotnet MonitorEconomic.WebUi.dll"

  db:
    image: postgres:15
    container_name: monitor_economic_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: